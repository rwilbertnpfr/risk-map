<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NPFR · Community Risk Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link rel="stylesheet" href="app.css"/>
</head>
<body>

<div id="load-overlay">
  <div class="load-spinner"></div>
  <div class="load-title">NPFR · Community Risk</div>
  <div class="load-msg" id="load-msg">Loading data…</div>
</div>

<div id="app">

  <!-- ── MAIN HEADER ── -->
  <header id="header">
    <div class="logo">NPFR <span>· Community Risk</span></div>
    <div class="hdr-sep"></div>

    <div class="mode-pills">
      <button class="mode-pill active" id="mode-community" onclick="setMode('community')">Community</button>
      <button class="mode-pill"        id="mode-incident"  onclick="setMode('incident')">Incident Risk</button>
      <button class="mode-pill"        id="mode-coverage"  onclick="setMode('coverage')">Coverage</button>
      <button class="mode-pill"        id="mode-hazards"   onclick="setMode('hazards')">Target Hazards</button>
    </div>

    <div class="hdr-sep"></div>
    <div class="station-pills" id="station-pills"></div>
    <div class="hdr-sep"></div>
    <button id="export-btn" onclick="exportPDF()">⬇ Export PDF</button>
    <div id="synthetic-badge">Synthetic Data</div>
  </header>

  <!-- ── INFO MODAL ── -->
  <div id="info-overlay" onclick="closeInfoPanel(event)">
    <div id="info-panel">
      <div id="info-panel-header">
        <div id="info-panel-title">About This Map</div>
        <button id="info-close-btn" onclick="closeInfoPanel()" title="Close">✕</button>
      </div>
      <div id="info-panel-body">
        <div id="info-loading">Loading…</div>
      </div>
    </div>
  </div>

  <!-- ── SUB HEADER — metric select / program + risk tabs / coverage tabs / parks toggle ── -->
  <div id="subheader">
    <!-- Community mode: metric dropdown -->
    <div id="community-controls">
      <select id="metric-select">
        <optgroup label="Population">
          <option value="est_population">Est. Population</option>
          <option value="pct_hydrant_1000ft">Hydrant 1000ft (%)</option>
          <option value="pct_flood_ae">AE Flood Area (%)</option>
        </optgroup>
        <optgroup label="Residential">
          <option value="sfr_units">SFR Bldg</option>
          <option value="multifamily_units">Multifamily Bldg</option>
          <option value="mobile_units">Mobile Homes</option>
          <option value="residential_units">Residential Bldg (All)</option>
          <option value="residential_pct">Residential %</option>
          <option value="residential_grnd_sqft">Residential Total Sqft</option>
          <option value="residential_avg_yrbl">Residential Bldg Age</option>
          <option value="sfr_flood_pct">SFR Flood %</option>
        </optgroup>
        <optgroup label="Commercial">
          <option value="commercial_units">Commercial Bldg</option>
          <option value="retail_units">Retail Bldg</option>
          <option value="commercial_grnd_sqft">Commercial Total Sqft</option>
          <option value="retail_grnd_sqft">Retail Total Sqft</option>
        </optgroup>
        <optgroup label="Other">
          <option value="vacant_units">Vacant Lots</option>
          <option value="vacant_pct">Vacant %</option>
        </optgroup>
      </select>
    </div>
    <!-- Incident mode: program + risk tabs -->
    <div id="incident-controls">
      <div id="fy-badge">—</div>
    </div>
    <div class="prog-tabs" id="prog-tabs"></div>
    <div class="risk-tabs" id="risk-tabs"></div>
    <!-- Coverage mode: view + sub tabs -->
    <div class="coverage-view-tabs" id="coverage-view-tabs"></div>
    <div class="coverage-sub-tabs" id="coverage-sub-tabs"></div>
    <!-- Target Hazards mode: occupancy category filter tabs -->
    <div id="hazards-controls"></div>
    <!-- Always visible: Parks/Conservation toggle + theme toggle (float right) -->
    <div id="conservation-control">
      <label class="layer-toggle">
        <input type="checkbox" id="conservation-toggle" checked onchange="toggleConservationLayer(this.checked)">
        <span class="layer-toggle-label">Parks / Conservation</span>
      </label>
      <div class="subhdr-sep"></div>
      <div class="theme-switch" onclick="toggleTheme()" title="Toggle light/dark mode">
        <div class="theme-switch-track">
          <div class="theme-switch-thumb" id="theme-thumb">🌙</div>
        </div>
        <span class="theme-switch-label" id="theme-label">Dark Mode</span>
      </div>
    </div>
  </div>

  <!-- ── MAP ── -->
  <div id="map-wrap">
    <div id="map"></div>
    <button id="info-btn" onclick="openInfoPanel()" title="About this map">ⓘ About</button>
    <div id="station-badge" style="display:none"></div>
    <div id="legend">
      <div class="legend-title" id="legend-title">Est. Population</div>
      <div id="legend-rows"></div>
    </div>
  </div>

  <!-- ── SIDEBAR ── -->
  <aside id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title" id="sidebar-title">Overview</div>
      <div class="sidebar-sub" id="sidebar-sub">Click a station or ESZ polygon to explore</div>
    </div>
    <div class="sidebar-body" id="sidebar-body">
      <div class="empty-state">
        <div class="empty-icon">⬡</div>
        <div class="empty-title">Select an ESZ</div>
        <div>Click any polygon on the map to view its full risk profile, or use the station pills to filter.</div>
      </div>
    </div>
  </aside>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
// Inline error handler — must run before app.js so JS errors render to the map div
window.onerror = function(msg, src, ln, col, err) {
  var el = document.getElementById('map');
  if (!el) return false;
  var stack = err && err.stack ? err.stack.split('\n').join('<br>') : '';
  el.innerHTML = '<div style="padding:24px;font-family:monospace;font-size:13px;color:#ff6b6b;'
    + 'background:#1a0000;height:100%;overflow:auto;box-sizing:border-box">'
    + '<strong>JS ERROR</strong><br><br>' + msg
    + '<br>Line ' + ln + '  col ' + col
    + '<br><br>' + stack + '</div>';
  return false;
};
</script>
<script src="app.js"></script>
</body>
</html>
